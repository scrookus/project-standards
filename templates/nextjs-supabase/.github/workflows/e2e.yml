name: E2E

# Only runs when app code, e2e specs, or Supabase schema change.

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'lib/**'
      - 'e2e/**'
      - 'supabase/**'
      - 'playwright.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'lib/**'
      - 'e2e/**'
      - 'supabase/**'
      - 'playwright.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/e2e.yml'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright e2e tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '{{NODE_VERSION}}'
          cache: 'npm'

      - uses: supabase/setup-cli@v1
        with:
          version: '{{SUPABASE_CLI_VERSION}}'

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Boot local Supabase
        run: supabase start || (supabase stop --no-backup; supabase start)

      - name: Write .env.local from supabase status
        run: |
          set -e
          eval "$(supabase status -o env)"
          cat > .env.local <<EOF
          NEXT_PUBLIC_SUPABASE_URL=$API_URL
          NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY
          SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY
          EOF

      - run: npm run test:e2e

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup || true

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
