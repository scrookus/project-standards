name: E2E

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'e2e/**'
      - 'index.html'
      - 'vite.config*'
      - 'supabase/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'e2e/**'
      - 'index.html'
      - 'vite.config*'
      - 'supabase/**'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright smoke tests (Phase A)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '{{NODE_VERSION}}'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  e2e-phase-b:
    name: Playwright authenticated tests (Phase B)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '{{NODE_VERSION}}'
          cache: 'npm'

      - uses: supabase/setup-cli@v1
        with:
          version: '{{SUPABASE_CLI_VERSION}}'

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Boot local Supabase
        run: supabase start || (supabase stop --no-backup; supabase start)

      - name: Write .env.e2e.local from supabase status
        run: |
          set -e
          eval "$(supabase status -o env)"
          cat > .env.e2e.local <<EOF
          VITE_SUPABASE_URL=$API_URL
          VITE_SUPABASE_ANON_KEY=$ANON_KEY
          SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY
          E2E_USER_EMAIL=e2e-user@example.test
          E2E_USER_PASSWORD=local-e2e-password
          E2E_ADMIN_EMAIL=e2e-admin@example.test
          E2E_ADMIN_PASSWORD=local-e2e-password
          EOF

      - name: Seed e2e accounts
        run: npm run test:e2e:local-auth

      - name: Run Phase B authenticated specs
        run: npm run test:e2e:auth

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup || true

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-phase-b
          path: playwright-report/
          retention-days: 7
